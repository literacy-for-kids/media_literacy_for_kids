<svg viewBox="0 0 660 430" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="blTitle">
  <title id="blTitle">The bias and algorithm feedback loop: you believe X, you click on X, the algorithm shows more X, you believe X even more, and around it goes</title>
  <defs>
    <marker id="blA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="658" height="428" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="330" y="40" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="19" font-weight="700" fill="#1e293b">The Bias + Algorithm Feedback Loop</text>

  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="14.5" font-weight="700" text-anchor="middle">
    <!-- top node -->
    <rect x="240" y="66" width="180" height="48" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="330" y="95" fill="#1e293b">You believe X</text>
    <!-- right node -->
    <rect x="440" y="196" width="180" height="48" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="530" y="225" fill="#1e293b">You click on X</text>
    <!-- bottom node -->
    <rect x="225" y="330" width="210" height="48" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="330" y="352" fill="#1e293b">Algorithm shows</text>
    <text x="330" y="370" fill="#1e293b">more X</text>
    <!-- left node -->
    <rect x="40" y="196" width="180" height="48" rx="12" fill="#dc2626"/>
    <text x="130" y="218" fill="#ffffff">You believe X</text>
    <text x="130" y="236" fill="#ffffff">even more</text>
  </g>

  <g stroke="#dc2626" stroke-width="2.5" fill="none">
    <path d="M428 106 Q510 130 528 188" marker-end="url(#blA)"/>
    <path d="M524 252 Q500 320 444 344" marker-end="url(#blA)"/>
    <path d="M218 346 Q150 316 132 252" marker-end="url(#blA)"/>
    <path d="M136 188 Q158 118 232 98" marker-end="url(#blA)"/>
  </g>

  <text x="330" y="230" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#64748b">and around</text>
  <text x="330" y="248" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#64748b">it goes&#8230;</text>
</svg>
