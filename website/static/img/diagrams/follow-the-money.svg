<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ftmTitle">
  <title id="ftmTitle">Follow the money in a free app: you give the app your time and attention, the app shows you ads, and the advertiser pays the app to put ads in front of your eyes</title>
  <defs>
    <marker id="ftmA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
    <marker id="ftmG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="758" height="438" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="380" y="42" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="700" fill="#1e293b">Follow the Money</text>

  <g font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle">
    <!-- App node (top center) -->
    <rect x="290" y="66" width="180" height="52" rx="12" fill="#dc2626"/>
    <text x="380" y="98" font-size="16" font-weight="700" fill="#ffffff">The Free App</text>
    <!-- You node (bottom left) -->
    <rect x="60" y="330" width="150" height="52" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="135" y="362" font-size="16" font-weight="700" fill="#1e293b">You</text>
    <!-- Advertiser node (bottom right) -->
    <rect x="545" y="330" width="170" height="52" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="630" y="362" font-size="16" font-weight="700" fill="#1e293b">Advertiser</text>
  </g>

  <!-- You -> App: time and attention (outer left) -->
  <path d="M118 326 Q120 180 282 106" stroke="#dc2626" stroke-width="2.5" fill="none" marker-end="url(#ftmA)"/>
  <!-- App -> You: shows you ads (inner) -->
  <path d="M330 124 Q250 210 172 324" stroke="#dc2626" stroke-width="2.5" fill="none" marker-end="url(#ftmA)"/>
  <!-- Advertiser -> App: pays money (right, green for money) -->
  <path d="M625 326 Q620 180 478 104" stroke="#16a34a" stroke-width="2.5" fill="none" marker-end="url(#ftmG)"/>

  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="13" text-anchor="middle" fill="#1e293b" stroke="#ffffff" stroke-width="4" paint-order="stroke" stroke-linejoin="round">
    <text x="118" y="200" font-weight="700">your time</text>
    <text x="118" y="217" font-weight="700">and attention</text>
    <text x="272" y="228">shows you ads</text>
    <text x="628" y="200" fill="#15803d" font-weight="700">pays to put ads in</text>
    <text x="628" y="217" fill="#15803d" font-weight="700">front of your eyes</text>
  </g>

  <text x="380" y="402" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="14.5" font-weight="700" fill="#1e293b">When the app is free, your attention is the product.</text>
  <text x="380" y="422" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12.5" fill="#64748b">The more time you spend, the more ads the app can show — and the more money it makes.</text>
</svg>
