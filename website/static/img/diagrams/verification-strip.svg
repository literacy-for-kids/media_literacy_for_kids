<svg viewBox="0 0 860 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="vsTitle">
  <title id="vsTitle">The verification habit in five steps: stop, notice, check, compare, decide</title>
  <defs>
    <marker id="vsA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="858" height="238" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="430" y="42" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="700" fill="#1e293b">The Verification Habit</text>

  <g font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle">
    <g>
      <circle cx="105" cy="120" r="38" fill="#dc2626"/>
      <text x="105" y="127" font-size="15" font-weight="800" fill="#ffffff">STOP</text>
      <text x="105" y="185" font-size="12.5" fill="#64748b">before you share</text>
      <text x="105" y="202" font-size="12.5" fill="#64748b">or believe it</text>
    </g>
    <g>
      <circle cx="268" cy="120" r="38" fill="#ef4444"/>
      <text x="268" y="127" font-size="14" font-weight="800" fill="#ffffff">NOTICE</text>
      <text x="268" y="185" font-size="12.5" fill="#64748b">how it makes</text>
      <text x="268" y="202" font-size="12.5" fill="#64748b">you feel</text>
    </g>
    <g>
      <circle cx="431" cy="120" r="38" fill="#f97316"/>
      <text x="431" y="127" font-size="14.5" font-weight="800" fill="#ffffff">CHECK</text>
      <text x="431" y="185" font-size="12.5" fill="#64748b">who made it,</text>
      <text x="431" y="202" font-size="12.5" fill="#64748b">and when</text>
    </g>
    <g>
      <circle cx="594" cy="120" r="38" fill="#ca8a04"/>
      <text x="594" y="127" font-size="12.5" font-weight="800" fill="#ffffff">COMPARE</text>
      <text x="594" y="185" font-size="12.5" fill="#64748b">what do other</text>
      <text x="594" y="202" font-size="12.5" fill="#64748b">sources say?</text>
    </g>
    <g>
      <circle cx="757" cy="120" r="38" fill="#16a34a"/>
      <text x="757" y="127" font-size="14" font-weight="800" fill="#ffffff">DECIDE</text>
      <text x="757" y="185" font-size="12.5" fill="#64748b">trust it, trash it,</text>
      <text x="757" y="202" font-size="12.5" fill="#64748b">or keep checking</text>
    </g>
  </g>

  <g stroke="#dc2626" stroke-width="2.5">
    <line x1="146" y1="120" x2="224" y2="120" marker-end="url(#vsA)"/>
    <line x1="309" y1="120" x2="387" y2="120" marker-end="url(#vsA)"/>
    <line x1="472" y1="120" x2="550" y2="120" marker-end="url(#vsA)"/>
    <line x1="635" y1="120" x2="713" y2="120" marker-end="url(#vsA)"/>
  </g>
</svg>
