<svg viewBox="0 0 860 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="cxTitle">
  <title id="cxTitle">Two made-up cereal boxes selling similar cereal: one loud box with a cartoon mascot, starburst, and the word awesome; one plain box with earthy colors and words like natural and whole grain — different design choices create different feelings</title>
  <rect x="1" y="1" width="858" height="558" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="430" y="40" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700" fill="#1e293b">Two Boxes, One Cereal</text>
  <text x="430" y="64" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" fill="#64748b">Both are selling roughly the same oats. Why do they look so different?</text>

  <!-- LOUD box -->
  <g>
    <rect x="105" y="95" width="280" height="360" rx="10" fill="#7c3aed"/>
    <rect x="105" y="95" width="280" height="360" rx="10" fill="none" stroke="#5b21b6" stroke-width="4"/>
    <!-- starburst -->
    <g transform="translate(330 150)">
      <polygon points="0,-34 8,-11 32,-11 13,4 20,27 0,13 -20,27 -13,4 -32,-11 -8,-11" fill="#fde047"/>
      <text y="6" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="900" fill="#7c3aed">NEW!</text>
    </g>
    <text x="245" y="150" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="30" font-weight="900" fill="#fde047" transform="rotate(-4 245 150)">CHOCO</text>
    <text x="245" y="188" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="30" font-weight="900" fill="#fb7185" transform="rotate(-4 245 188)">BLAST!!</text>
    <!-- mascot: goofy rocket squirrel-ish blob -->
    <g transform="translate(200 300)">
      <ellipse cx="0" cy="0" rx="55" ry="62" fill="#fb923c"/>
      <circle cx="-18" cy="-18" r="12" fill="#ffffff"/><circle cx="18" cy="-18" r="12" fill="#ffffff"/>
      <circle cx="-15" cy="-16" r="5" fill="#1e293b"/><circle cx="21" cy="-16" r="5" fill="#1e293b"/>
      <path d="M-22,18 Q0,42 22,18" fill="none" stroke="#1e293b" stroke-width="5" stroke-linecap="round"/>
      <polygon points="46,-50 78,-66 66,-32" fill="#fde047"/>
    </g>
    <text x="245" y="398" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="800" fill="#ffffff">FREE GAME INSIDE!</text>
    <text x="245" y="425" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#ddd6fe">chocolatey oat cereal</text>
    <text x="245" y="485" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13.5" font-weight="700" fill="#7c3aed">loud &#183; fun &#183; aimed at kids</text>
    <text x="245" y="505" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12.5" fill="#64748b">feeling it sells: excitement</text>
  </g>

  <!-- PLAIN box -->
  <g>
    <rect x="475" y="95" width="280" height="360" rx="10" fill="#f5f0e6"/>
    <rect x="475" y="95" width="280" height="360" rx="10" fill="none" stroke="#a8a29e" stroke-width="3"/>
    <text x="615" y="165" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#44403c">Morning Grain</text>
    <line x1="530" y1="185" x2="700" y2="185" stroke="#a8a29e" stroke-width="2"/>
    <!-- wheat sprig -->
    <g transform="translate(615 280)" stroke="#78716c" fill="#d6c9a8">
      <line x1="0" y1="55" x2="0" y2="-45" stroke-width="4"/>
      <ellipse cx="-14" cy="-18" rx="12" ry="7" transform="rotate(-35 -14 -18)"/>
      <ellipse cx="14" cy="-18" rx="12" ry="7" transform="rotate(35 14 -18)"/>
      <ellipse cx="-14" cy="-38" rx="12" ry="7" transform="rotate(-35 -14 -38)"/>
      <ellipse cx="14" cy="-38" rx="12" ry="7" transform="rotate(35 14 -38)"/>
      <ellipse cx="0" cy="-52" rx="8" ry="12"/>
    </g>
    <text x="615" y="385" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-style="italic" fill="#57534e">100% whole grain &#183; natural</text>
    <text x="615" y="412" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#78716c">simple ingredients since 1962</text>
    <text x="615" y="485" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13.5" font-weight="700" fill="#57534e">calm &#183; earthy &#183; aimed at parents</text>
    <text x="615" y="505" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12.5" fill="#64748b">feeling it sells: health and trust</text>
  </g>

  <text x="430" y="540" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#94a3b8">Both brands are fictional. Different choices create different feelings &#8212; on purpose.</text>
</svg>
