<svg viewBox="0 0 520 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="saTitle">
  <title id="saTitle">A made-up social media feed with five posts: some are regular posts from friends and community groups, and some are advertising — can you spot which ones?</title>
  <rect x="1" y="1" width="518" height="898" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="260" y="38" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Spot the Ad! (a made-up feed)</text>

  <!-- phone -->
  <rect x="50" y="55" width="420" height="820" rx="24" fill="#f8fafc" stroke="#94a3b8" stroke-width="3"/>
  <rect x="50" y="55" width="420" height="46" rx="24" fill="#dc2626"/>
  <rect x="50" y="80" width="420" height="21" fill="#dc2626"/>
  <text x="260" y="86" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="17" font-weight="800" fill="#ffffff">Chirper</text>

  <!-- post 1: regular -->
  <g font-family="'Segoe UI', system-ui, sans-serif">
    <rect x="66" y="112" width="388" height="138" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="98" cy="146" r="19" fill="#8b5cf6"/>
    <text x="98" y="152" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">J</text>
    <text x="128" y="142" font-size="14.5" font-weight="700" fill="#1e293b">Jade</text>
    <text x="128" y="159" font-size="12" fill="#94a3b8">@jade_draws &#183; 2h</text>
    <text x="82" y="192" font-size="13.5" fill="#1e293b">Look at this sunset from my window!</text>
    <text x="82" y="211" font-size="13.5" fill="#1e293b">Best one all week &#127751;</text>
    <text x="82" y="238" font-size="13" fill="#94a3b8">&#9825; 14&#160;&#160;&#160;&#128172; 3&#160;&#160;&#160;&#8635; 1</text>
  </g>

  <!-- post 2: labeled ad -->
  <g font-family="'Segoe UI', system-ui, sans-serif">
    <rect x="66" y="258" width="388" height="138" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="98" cy="292" r="19" fill="#0ea5e9"/>
    <text x="98" y="298" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">SC</text>
    <text x="128" y="288" font-size="14.5" font-weight="700" fill="#1e293b">SparkleCola</text>
    <text x="128" y="305" font-size="11.5" fill="#94a3b8">Sponsored</text>
    <text x="82" y="338" font-size="13.5" fill="#1e293b">Summer tastes better with SPARKLE!</text>
    <text x="82" y="357" font-size="13.5" fill="#1e293b">Grab the new rainbow flavor &#129380;</text>
    <rect x="82" y="368" width="110" height="22" rx="11" fill="#0ea5e9"/>
    <text x="137" y="383" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Shop now</text>
  </g>

  <!-- post 3: regular -->
  <g font-family="'Segoe UI', system-ui, sans-serif">
    <rect x="66" y="404" width="388" height="138" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="98" cy="438" r="19" fill="#16a34a"/>
    <text x="98" y="444" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">M</text>
    <text x="128" y="434" font-size="14.5" font-weight="700" fill="#1e293b">Max_Games</text>
    <text x="128" y="451" font-size="12" fill="#94a3b8">@maxplays &#183; 5h</text>
    <text x="82" y="484" font-size="13.5" fill="#1e293b">FINALLY beat level 50 in Turtle</text>
    <text x="82" y="503" font-size="13.5" fill="#1e293b">Quest!! Took me all week &#127942;</text>
    <text x="82" y="530" font-size="13" fill="#94a3b8">&#9825; 31&#160;&#160;&#160;&#128172; 8&#160;&#160;&#160;&#8635; 2</text>
  </g>

  <!-- post 4: disguised ad -->
  <g font-family="'Segoe UI', system-ui, sans-serif">
    <rect x="66" y="550" width="388" height="138" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="98" cy="584" r="19" fill="#f59e0b"/>
    <text x="98" y="590" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">R</text>
    <text x="128" y="580" font-size="14.5" font-weight="700" fill="#1e293b">Riley&#10024;</text>
    <text x="128" y="597" font-size="12" fill="#94a3b8">@rileysparkle &#183; 1d</text>
    <text x="82" y="630" font-size="13.5" fill="#1e293b">Obsessed with my new SpeedyKicks!!</text>
    <text x="82" y="649" font-size="13.5" fill="#1e293b">You all NEED a pair &#128095; link in bio #ad</text>
    <text x="82" y="676" font-size="13" fill="#94a3b8">&#9825; 208&#160;&#160;&#160;&#128172; 41&#160;&#160;&#160;&#8635; 22</text>
  </g>

  <!-- post 5: regular (official but not an ad) -->
  <g font-family="'Segoe UI', system-ui, sans-serif">
    <rect x="66" y="696" width="388" height="138" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="98" cy="730" r="19" fill="#475569"/>
    <text x="98" y="736" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">CL</text>
    <text x="128" y="726" font-size="14.5" font-weight="700" fill="#1e293b">City Library</text>
    <text x="128" y="743" font-size="12" fill="#94a3b8">@citylibrary &#183; 1d</text>
    <text x="82" y="776" font-size="13.5" fill="#1e293b">Story hour this Saturday at 10am!</text>
    <text x="82" y="795" font-size="13.5" fill="#1e293b">All ages welcome. Free, as always &#128218;</text>
    <text x="82" y="822" font-size="13" fill="#94a3b8">&#9825; 12&#160;&#160;&#160;&#128172; 2&#160;&#160;&#160;&#8635; 6</text>
  </g>

  <text x="260" y="892" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12.5" fill="#64748b">All accounts and brands are fictional. Circle every post you think is advertising!</text>
</svg>
