name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ./website/package-lock.json
      - run: npm ci
      - run: npm run build

  lint-links:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ./website/package-lock.json
      - run: npm ci
        working-directory: ./website
      - run: npm run build
        working-directory: ./website
      - uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --exclude 'https://shields.io'
            --exclude 'https://camo.githubusercontent.com'
            ./README.md
          fail: true
      - uses: lycheeverse/lychee-action@v2
        with:
          workingDirectory: ./website
          args: >-
            --exclude '^/docs($|/|#)'
            --exclude 'https://shields.io'
            --exclude 'https://camo.githubusercontent.com'
            ./README.md
            './docs/**/*.md'
          fail: true
