name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ./website/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run validate:build

  lint-links:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ./website/package-lock.json
      - run: npm ci
        working-directory: ./website
      - run: npm run build
        working-directory: ./website
      - name: Mirror build under site base path for lychee
        run: |
          rm -rf ./.lychee-root
          mkdir -p './.lychee-root'
          cp -R ./website/build/. './.lychee-root/'
          rm -f './.lychee-root/404.html'
      - uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --root-dir ./.lychee-root
            --timeout 30
            --max-retries 3
            --retry-wait-time 5
            --exclude 'https://shields.io'
            --exclude 'https://camo.githubusercontent.com'
            --exclude 'literacy-for-kids\.com'
            './.lychee-root/**/*.html'
          fail: true
